# integration.conf — generic anonymizer config for integration tests.
#
# Uses fictional table/column names. Covers every template pattern the
# anonymizer supports so tests don't need a client-specific config file.

filters:

  # ── full PII replacement ────────────────────────────────────────────────────
  # Models a typical "users" table: names, contact, credentials, tokens.
  users:
    columns:
      first_name:
        value: "{{ fakerFirstName }}"
      last_name:
        value: "{{ fakerLastName }}"
      full_name:
        value: "{{ fakerName }}"
      email:
        value: "{{ fakerEmail }}"
      phone:
        value: "{{ fakerPhone }}"
      password_hash:
        # Static bcrypt hash for the word "password".
        value: "$2y$10$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi"
      ip_address:
        value: "127.0.0.1"
      session_token:
        value: "{{ uuidv4 }}"
      avatar_url:
        value: "https://example.com/avatar.png"
      oauth_token:
        value: "{{ null }}"
      lat:
        value: "{{ null }}"
      lng:
        value: "{{ null }}"

  # ── address / location ──────────────────────────────────────────────────────
  addresses:
    columns:
      street:
        value: "{{ fakerStreetAddress }}"
      street2:
        value: "{{ fakerSecondaryAddress }}"
      city:
        value: "{{ fakerCity }}"
      postcode:
        value: "{{ randNumeric 5 }}"

  # ── payment credentials — all nulled ────────────────────────────────────────
  # Models a payment-gateway credentials table: every column must be NULL.
  payment_credentials:
    columns:
      api_username:
        value: "{{ null }}"
      api_password:
        value: "{{ null }}"
      api_key:
        value: "{{ null }}"
      api_secret:
        value: "{{ null }}"
      merchant_id:
        value: "{{ null }}"
      terminal_id:
        value: "{{ null }}"
      meta:
        value: "{{ null }}"

  # ── financial records ────────────────────────────────────────────────────────
  transactions:
    columns:
      invoice_no:
        value: "{{ fakerInvoice }}"
      payer_name:
        value: "{{ fakerName }}"
      payer_email:
        value: "{{ fakerEmail }}"
      payer_phone:
        value: "{{ fakerPhone }}"
      billing_address:
        value: "{{ fakerStreetAddress }}"
      billing_city:
        value: "{{ fakerCity }}"
      billing_postcode:
        value: "{{ randNumeric 5 }}"
      ip_address:
        value: "127.0.0.1"
      authorization_code:
        value: "{{ randAlphaNum 10 | upper }}"
      transaction_id:
        value: "{{ uuidv4 }}"
      card_token:
        value: "{{ null }}"
      card_expiry:
        value: "12/99"
      raw_response:
        value: "{{ null }}"
      account_holder:
        value: "{{ fakerName }}"
      bank_name:
        value: "{{ fakerCompany }}"
      cheque_no:
        value: "{{ randNumeric 6 }}"
      comment:
        value: "Lorem ipsum dolor sit amet"

  # ── organisation / company info ──────────────────────────────────────────────
  organisations:
    columns:
      name:
        value: "{{ fakerCompany }}"
      tax_id:
        value: "{{ fakerEIN }}"
      iban:
        value: "{{ fakerIBAN }}"
      swift:
        value: "{{ fakerSwift }}"
      website:
        value: "https://example.com"
      access_token:
        value: "{{ uuidv4 }}"
      meta:
        value: "{}"

  # ── integration secrets (nulled) ────────────────────────────────────────────
  integration_secrets:
    columns:
      credentials_json:
        value: "{{ null }}"
      webhook_secret:
        value: "{{ null }}"
      integration_uuid:
        value: "{{ uuidv4 }}"

  # ── contact records ──────────────────────────────────────────────────────────
  contacts:
    columns:
      first_name:
        value: "{{ fakerFirstName }}"
      last_name:
        value: "{{ fakerLastName }}"
      email:
        value: "{{ fakerEmail }}"
      phone:
        value: "{{ fakerPhone }}"
      note:
        value: "Lorem ipsum dolor sit amet"

  # ── call / SMS logs ──────────────────────────────────────────────────────────
  call_logs:
    columns:
      caller_number:
        value: "{{ fakerPhone }}"
      recipient_number:
        value: "{{ fakerPhone }}"

  # ── unsubscribe list ─────────────────────────────────────────────────────────
  unsubscribe_list:
    columns:
      email:
        value: "{{ fakerEmail }}"
